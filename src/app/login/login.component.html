<div class="text-center lg:inline-block mt-3 mb-5">
    <ng-container *ngIf="auth.isAuthenticated$ | async; else loggedOut">
        <span *ngIf="auth.user$ | async as user">
            <span class="menu-seperator">
                |
            </span>
            <a routerLink="/user" routerLinkActive="is-active" class="px-3 py-3 hover:text-gray-700 cursor-pointer">Profile</a>
            <span class="menu-seperator">
                |
            </span>
        </span>
        <button (click)="auth.logout({ returnTo: document.location.origin })" class="inline-flex items-center border-0 py-1 px-3 focus:outline-none rounded text-red-600 sm:text-red-800 hover:underline mt-4 md:mt-0">
            Logout
        </button>
    </ng-container>
    <ng-template #loggedOut>
        <button (click)="auth.loginWithRedirect()" class="inline sm:text-center md:ml-5 px-5 py-2 text-sm font-medium text-white bg-indigo-600 border border-indigo-600 rounded active:text-indigo-500 hover:bg-indigo-700 focus:outline-none focus:ring">
            Login/Register
        </button>
    </ng-template>
</div>
